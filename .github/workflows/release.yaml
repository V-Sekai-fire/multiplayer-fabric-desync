name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          DARWIN_ARM64_SHA=$(sha256sum dist/*_Darwin_arm64.tar.gz | awk '{print $1}')
          DARWIN_AMD64_SHA=$(sha256sum dist/*_Darwin_amd64.tar.gz | awk '{print $1}')
          LINUX_ARM64_SHA=$(sha256sum dist/*_Linux_arm64.tar.gz | awk '{print $1}')
          LINUX_AMD64_SHA=$(sha256sum dist/*_Linux_amd64.tar.gz | awk '{print $1}')

          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key" \
            git clone git@github.com:V-Sekai-fire/homebrew-multiplayer-fabric.git tap

          cat > tap/Formula/multiplayer-fabric-desync.rb <<FORMULA
          class MultiplayerFabricDesync < Formula
            desc "Content-addressed binary distribution for multiplayer fabric"
            homepage "https://github.com/V-Sekai-fire/multiplayer-fabric-desync"
            version "${VERSION#v}"
            license "Apache-2.0"

            on_macos do
              on_arm do
                url "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/${VERSION}/multiplayer-fabric-desync_Darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/${VERSION}/multiplayer-fabric-desync_Darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/${VERSION}/multiplayer-fabric-desync_Linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
              on_intel do
                url "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/${VERSION}/multiplayer-fabric-desync_Linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
            end

            def install
              bin.install "desync"
            end

            test do
              system "\#{bin}/desync", "--help"
            end
          end
          FORMULA

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/multiplayer-fabric-desync.rb
          git diff --cached --quiet || \
            git commit -m "chore: update multiplayer-fabric-desync to ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key" git push

      - name: Update Scoop bucket
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          VERSION="${GITHUB_REF_NAME}"

          WIN_AMD64_SHA=$(sha256sum dist/*_Windows_amd64.zip | awk '{print $1}')
          WIN_ARM64_SHA=$(sha256sum dist/*_Windows_arm64.zip | awk '{print $1}')

          mkdir -p ~/.ssh
          echo "$TAP_DEPLOY_KEY" > ~/.ssh/tap_deploy_key
          chmod 600 ~/.ssh/tap_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key" \
            git clone git@github.com:V-Sekai-fire/scoop-multiplayer-fabric.git scoop

          cat > scoop/bucket/multiplayer-fabric-desync.json <<MANIFEST
          {
            "version": "${VERSION#v}",
            "description": "Content-addressed binary distribution for multiplayer fabric",
            "homepage": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync",
            "license": "Apache-2.0",
            "architecture": {
              "64bit": {
                "url": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/${VERSION}/multiplayer-fabric-desync_Windows_amd64.zip",
                "hash": "${WIN_AMD64_SHA}"
              },
              "arm64": {
                "url": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/${VERSION}/multiplayer-fabric-desync_Windows_arm64.zip",
                "hash": "${WIN_ARM64_SHA}"
              }
            },
            "bin": "desync.exe",
            "checkver": {
              "github": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync"
            },
            "autoupdate": {
              "architecture": {
                "64bit": {
                  "url": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/v\$version/multiplayer-fabric-desync_Windows_amd64.zip",
                  "hash": {
                    "url": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/v\$version/checksums.txt",
                    "regex": "([a-f0-9]{64})\\\\s+multiplayer-fabric-desync_Windows_amd64.zip"
                  }
                },
                "arm64": {
                  "url": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/v\$version/multiplayer-fabric-desync_Windows_arm64.zip",
                  "hash": {
                    "url": "https://github.com/V-Sekai-fire/multiplayer-fabric-desync/releases/download/v\$version/checksums.txt",
                    "regex": "([a-f0-9]{64})\\\\s+multiplayer-fabric-desync_Windows_arm64.zip"
                  }
                }
              }
            }
          }
          MANIFEST

          cd scoop
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add bucket/multiplayer-fabric-desync.json
          git diff --cached --quiet || \
            git commit -m "chore: update multiplayer-fabric-desync to ${VERSION}"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/tap_deploy_key" git push
